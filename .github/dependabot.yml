version: 2

registries:
  dockerhub:
    type: docker-registry
    url: https://registry.hub.docker.com
    username: ${{ secrets.DOCKER_USERNAME }}
    password: ${{ secrets.DOCKER_PASSWORD }}
    replaces-base: true

updates:
  - package-ecosystem: 'docker'
    registries:
      - dockerhub
    directory: '/'
    schedule:
      interval: 'daily'
